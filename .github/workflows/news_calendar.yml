name: Weekly News Calendar Run

on:
  schedule:
    # Runs at 00:05 every Monday.
    - cron: '5 0 * * 1'
  workflow_dispatch: # Allows manual run inside the Actions UI

jobs:
  run-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Calendar Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python news_calendar.py
